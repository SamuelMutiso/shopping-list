<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sams Shopping List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SAMS SHOPPING LIST</h1>
    </header>

    <div class="Main">
<div class="input-section">
    <input type="text" id="itemInput" placeholder="Item name" required>
    <input type="number" id="itemPrice" placeholder="Price" required>
    <button id="addBtn">Add to List</button>
</div>
<div id="shoppingList"></div>
<div class="footer-controls">
    <button id="clearBtn"> Clear Entire List</button>
    <p class="total-display">Total Cost: <span id="total">KSH 0</span></p>
</div>
    <script src="main.js"></script>
</body>
</html>
