<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sams Shopping List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SAMS SHOPPING LIST</h1>
    </header>

    <div class="Main">
<div class="shopping-list">
    <! input section - - >
    <input type="text" id="itemInput" placeholder="Item name" required>
    <input type="number" id="itemPrice" placeholder="Price" required>
    <button id="addBtn"></button>
</div>
<!- - list container - ->
<div id="shoppingList"></div>
<!- - clearbutton is hidden intia;;y - - >
<div class="footer-controls">
<button id="clearBtn" style="display: none;">Clear list</button>

<p> Total:  <span id="total">0</span></p>
    </div>

    <script src="main.js"></script>
</body>
</html>
